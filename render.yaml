# Render Blueprint: SPA client routes (e.g. /dashboard) must rewrite to index.html.
# If this static site already exists without Blueprint, add the same rule in the dashboard:
# https://render.com/docs/redirects-rewrites — Source /* → Destination /index.html — Action Rewrite
services:
  - type: web
    name: aiastraweb
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
